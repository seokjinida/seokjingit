<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Neon Pop Sweeper</title>
  <style>
    :root {
      --bg: #050512;
      --world-bg: #0b0b1a;
      --panel: rgba(13, 16, 34, 0.9);
      --panel-line: rgba(110, 140, 255, 0.55);
      --text: #eaf0ff;
      --muted: #93a2d7;
      --btn: #5a7cff;
      --btn2: #263462;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
    }
    #app {
      position: relative;
      width: 100%;
      height: 100%;
      background: var(--bg);
    }
    #gameCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }
    .overlay-root {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }
    .overlay-shell {
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transform-origin: center center;
    }
    .card {
      min-width: 330px;
      max-width: min(90vw, 620px);
      background: var(--panel);
      border: 1px solid var(--panel-line);
      border-radius: 16px;
      padding: 24px 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45), 0 0 26px rgba(108, 126, 255, 0.2);
      text-align: center;
    }
    .title {
      margin: 0 0 10px;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-align: center;
    }
    .desc {
      margin: 0 0 10px;
      font-size: 16px;
      color: var(--text);
      line-height: 1.35;
      text-align: center;
    }
    .hint {
      margin: 0 0 18px;
      font-size: 16px;
      color: var(--muted);
      text-align: center;
    }
    .btn {
      border: 1px solid rgba(167, 184, 255, 0.55);
      border-radius: 12px;
      background: linear-gradient(180deg, #6a8dff, var(--btn));
      color: #fff;
      padding: 10px 18px;
      min-width: 180px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn.secondary {
      min-width: 160px;
      background: linear-gradient(180deg, #364778, var(--btn2));
    }
    .support-note {
      margin-top: 8px;
      min-height: 1.2em;
      color: #ff9ca1;
      font-size: 13px;
    }
    .join-title { margin: 0 0 6px; font-size: 24px; }
    .join-time { margin: 0 0 12px; font-size: 18px; font-weight: 700; color: #cdd8ff; }
    .progress-wrap {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
      overflow: hidden;
      margin-bottom: 12px;
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #6ee7ff, #9388ff);
    }
    .feed {
      list-style: none;
      margin: 0;
      padding: 0;
      text-align: left;
      color: #d5deff;
      font-size: 14px;
      line-height: 1.4;
    }
    .feed li {
      padding: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .fx-panel {
      border-radius: 16px;
      background: rgba(18, 21, 44, 0.84);
      border: 1px solid rgba(144, 163, 255, 0.4);
      padding: 16px 28px;
      font-size: 46px;
      font-weight: 900;
      letter-spacing: 0.04em;
      color: #f2f6ff;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas"></canvas>
    <div class="overlay-root">
      <div id="startShell" class="overlay-shell">
        <div class="card">
          <h1 class="title">Neon Pop Sweeper</h1>
          <p class="desc">60초 동안 네온 닷을 모아 최고 점수를 노리세요.</p>
          <p class="hint">이동: 드래그 조이스틱 / WASD / 방향키</p>
          <button id="startBtn" class="btn">게임 시작</button>
        </div>
        <button id="fullscreenBtn" class="btn secondary">전체화면</button>
        <div id="fullscreenNote" class="support-note"></div>
      </div>
      <div id="joinShell" class="overlay-shell hidden">
        <div id="joinCard" class="card" style="min-width:360px;">
          <h2 class="join-title">참가자 입장 중...</h2>
          <div id="joinTime" class="join-time">게임 시작까지 5초</div>
          <div class="progress-wrap"><div id="joinProgress" class="progress-fill"></div></div>
          <ul id="joinFeed" class="feed"></ul>
        </div>
      </div>
      <div id="startFxShell" class="overlay-shell hidden">
        <div id="startFxPanel" class="fx-panel">게임 시작!</div>
      </div>
      <div id="resultShell" class="overlay-shell hidden">
        <div id="resultCard" class="card" style="min-width:360px;">
          <h2 class="join-title">라운드 종료</h2>
          <p id="resultTop" class="desc" style="font-size:18px;font-weight:700;color:#ffde5d;"></p>
          <ul id="resultList" class="feed" style="margin-bottom:12px;"></ul>
          <button id="restartBtn" class="btn">다시 시작</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const CONFIG = {
        SESSION_MS: 60000,
        MAP_W: 2000,
        MAP_H: 2000,
        BASE_SPEED: 220,
        PLAYER_SPEED_MUL: 1.0,
        BOT_SPEED_MUL: 1.0,
        SCORE_MUL_PLAYER: 1.82,
        SCORE_MUL_BOT: 1.82,
        SCALE_MAX: 50,
        SCALE_GAIN_FACTOR: 0.35,
        SCALE_DECAY_DELAY: 1.2,
        SCALE_DECAY_PER_SEC: 5,
        COMBO_CHAIN_SEC: 0.6,
        DOT_INIT: 220,
        DOT_MIN: 220,
        DOT_MAX: 280,
        RESPAWN_TICK: 0.25,
        NO_SPAWN_RADIUS: 120,
        HAZARD_MAX_ACTIVE: 3,
        HAZARD_REBOUND_LOCK_SEC: 1.15,
        HAZARD_REBOUND_SPEED_MIN: 950,
        HAZARD_REBOUND_SPEED_MAX: 1650,
        FEVER_SEC: 2.5,
        FEVER_SPEED_BOOST: 0.1,
        FEVER_RADIUS_BOOST: 0.35,
        JOIN_TOTAL_SEC: 5.0,
        JOIN_SLIDE_SEC: 0.65,
        GAME_START_FX_SEC: 1.8,
        CAMERA_LERP: 0.1,
        CAMERA_ZOOM_MIN: 0.2,
        CAMERA_ZOOM_MAX: 3.0,
        CAMERA_ZOOM_START: 3.0,
        JOYSTICK_RADIUS_PX: 80,
        PARTICLE_MAX: 140,
        LOW_FPS_THRESHOLD: 45,
        LOW_FPS_HOLD_SEC: 1,
        DOT_TYPES: ["normal", "bonus", "fever", "chaser", "hazard"],
        DOT_SPEC: {
          normal: { base: 10, combo: 1, color: "#6df9ff" },
          bonus: { base: 25, combo: 2, color: "#95ff8f" },
          fever: { base: 40, combo: 4, color: "#ff7fe9" },
          chaser: { base: 55, combo: 5, color: "#ba8bff" },
          hazard: { base: 0, combo: 0, color: "#ff545f" }
        },
        DOT_PROB: [
          { type: "normal", w: 82 },
          { type: "bonus", w: 12 },
          { type: "fever", w: 3 },
          { type: "chaser", w: 2 },
          { type: "hazard", w: 1 }
        ],
        PARTICLE_TIERS: {
          normal: { count: [12, 20], speed: [520, 1000], life: [0.26, 0.42], spark: [2.2, 4.4], shard: [5.3, 9.3] },
          bonus: { count: [20, 30], speed: [720, 1360], life: [0.32, 0.52], spark: [2.8, 5.2], shard: [6.2, 10.9] },
          fever: { count: [28, 40], speed: [880, 1680], life: [0.38, 0.62], spark: [3.1, 5.8], shard: [7.0, 12.2] },
          chaser: { count: [32, 44], speed: [1040, 1840], life: [0.42, 0.70], spark: [3.4, 6.2], shard: [7.4, 13.0] },
          hazard: { count: [16, 24], speed: [640, 1200], life: [0.30, 0.50], spark: [2.6, 4.8], shard: [5.8, 10.1] }
        },
        BOT_NAMES: ["NeoFox", "MintBug", "RinRin", "JAY_92", "LunaRay", "ViviAce", "BlueKio", "NixOne"]
      };

      const app = document.getElementById("app");
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const els = {
        startShell: document.getElementById("startShell"),
        startBtn: document.getElementById("startBtn"),
        fullscreenBtn: document.getElementById("fullscreenBtn"),
        fullscreenNote: document.getElementById("fullscreenNote"),
        joinShell: document.getElementById("joinShell"),
        joinCard: document.getElementById("joinCard"),
        joinTime: document.getElementById("joinTime"),
        joinProgress: document.getElementById("joinProgress"),
        joinFeed: document.getElementById("joinFeed"),
        startFxShell: document.getElementById("startFxShell"),
        startFxPanel: document.getElementById("startFxPanel"),
        resultShell: document.getElementById("resultShell"),
        resultCard: document.getElementById("resultCard"),
        resultTop: document.getElementById("resultTop"),
        resultList: document.getElementById("resultList"),
        restartBtn: document.getElementById("restartBtn")
      };

      const state = {
        phase: "start",
        nowSec: 0,
        worldTimeSec: 0,
        view: { w: 0, h: 0, x: 0, y: 0, scale: 1, baseW: 1600 },
        camera: { x: CONFIG.MAP_W * 0.5, y: CONFIG.MAP_H * 0.5, zoom: CONFIG.CAMERA_ZOOM_START },
        joinStartSec: 0,
        startFxStartSec: 0,
        playingStartSec: 0,
        actors: [],
        playerId: "you",
        dots: [],
        particles: [],
        respawnAcc: 0,
        ranks: [],
        rankArrival: {},
        joinFeed: [],
        lowFx: false,
        lowFxAccSec: 0,
        fps: 60,
        input: {
          keyVec: { x: 0, y: 0 },
          joyVec: { x: 0, y: 0 },
          pointerActive: false,
          pointerId: -1,
          joyBase: null,
          joyStick: null
        },
        comboPopUntil: 0,
        comboPopFrom: 1,
        comboPopTo: 1
      };

      const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
      const lerp = (a, b, t) => a + (b - a) * t;
      const rand = (min, max) => min + Math.random() * (max - min);
      const randInt = (min, max) => Math.floor(rand(min, max + 1));
      const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);
      function norm(x, y) {
        const m = Math.hypot(x, y) || 1;
        return { x: x / m, y: y / m, m };
      }

      function getScale() {
        return Math.max(1, window.innerWidth) / state.view.baseW;
      }

      function resize() {
        const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
        const w = window.innerWidth;
        const h = window.innerHeight;
        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
        canvas.style.width = w + "px";
        canvas.style.height = h + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const ratio = 16 / 9;
        let vw = w;
        let vh = vw / ratio;
        if (vh > h) {
          vh = h;
          vw = vh * ratio;
        }
        state.view.w = vw;
        state.view.h = vh;
        state.view.x = (w - vw) * 0.5;
        state.view.y = (h - vh) * 0.5;
        state.view.scale = getScale();
      }

      function syncOverlayScale() {
        const s1 = clamp(state.view.scale, 0.78, 1);
        const s2 = clamp(state.view.scale * 1.02, 0.78, 1);
        els.startShell.style.transform = "scale(" + s1.toFixed(4) + ")";
        els.joinCard.style.transform = "scale(" + s2.toFixed(4) + ")";
        els.resultCard.style.transform = "scale(" + s2.toFixed(4) + ")";
      }

      function actorRadius(actor) {
        return (15 + actor.scaleLevel * 1.0) * 2.0;
      }

      function createActor(id, name, x, y, isPlayer) {
        return {
          id, name, x, y, isPlayer,
          vx: 0, vy: 0,
          score: 0,
          combo: 0,
          chainCount: 0,
          scaleLevel: 0,
          lastCollectSec: -999,
          feverUntil: -1,
          flashHazardUntil: -1,
          joined: isPlayer,
          joining: false,
          joinAtSec: isPlayer ? 0 : rand(0.4, 4.4),
          joinSlideStartSec: 0,
          joinStartPos: { x, y },
          joinTargetPos: { x, y },
          aiRetargetAcc: 0,
          aiTargetDotId: null
        };
      }

      function createDot(type, x, y, opts = {}) {
        const spec = CONFIG.DOT_SPEC[type];
        const dot = {
          id: crypto.randomUUID(),
          type,
          x,
          y,
          base: spec.base,
          comboGain: spec.combo,
          color: spec.color,
          bornSec: state.worldTimeSec,
          expirySec: Infinity,
          vx: 0,
          vy: 0,
          rebound: !!opts.rebound,
          collectableAtSec: opts.collectableAtSec ?? state.worldTimeSec
        };
        if (type === "chaser") {
          const a = rand(0, Math.PI * 2);
          const sp = rand(78, 104);
          dot.vx = Math.cos(a) * sp;
          dot.vy = Math.sin(a) * sp;
          dot.expirySec = state.worldTimeSec + rand(6, 8);
        }
        return dot;
      }

      function activeHazards() {
        let n = 0;
        for (const d of state.dots) {
          if (d.type === "hazard") n += 1;
        }
        return n;
      }

      function pickDotType() {
        let total = 0;
        for (const p of CONFIG.DOT_PROB) {
          if (p.type === "hazard" && activeHazards() >= CONFIG.HAZARD_MAX_ACTIVE) continue;
          total += p.w;
        }
        let r = rand(0, total);
        for (const p of CONFIG.DOT_PROB) {
          if (p.type === "hazard" && activeHazards() >= CONFIG.HAZARD_MAX_ACTIVE) continue;
          r -= p.w;
          if (r <= 0) return p.type;
        }
        return "normal";
      }

      function randomSpawnPoint() {
        for (let i = 0; i < 50; i += 1) {
          const x = rand(25, CONFIG.MAP_W - 25);
          const y = rand(25, CONFIG.MAP_H - 25);
          let ok = true;
          for (const a of state.actors) {
            if (!a.joined && !a.joining) continue;
            if (Math.hypot(a.x - x, a.y - y) < CONFIG.NO_SPAWN_RADIUS) {
              ok = false;
              break;
            }
          }
          if (ok) return { x, y };
        }
        return { x: rand(25, CONFIG.MAP_W - 25), y: rand(25, CONFIG.MAP_H - 25) };
      }

      function spawnDot(forceType) {
        const type = forceType || pickDotType();
        if (type === "hazard" && activeHazards() >= CONFIG.HAZARD_MAX_ACTIVE) return;
        const p = randomSpawnPoint();
        state.dots.push(createDot(type, p.x, p.y));
      }

      function initDots() {
        state.dots.length = 0;
        for (let i = 0; i < CONFIG.DOT_INIT; i += 1) spawnDot();
      }

      function initActors() {
        const cx = CONFIG.MAP_W * 0.5;
        const cy = CONFIG.MAP_H * 0.5;
        state.actors = [createActor("you", "YOU", cx, cy, true)];
        const names = [...CONFIG.BOT_NAMES];
        for (let i = 0; i < 3; i += 1) {
          const idx = randInt(0, names.length - 1);
          const name = names.splice(idx, 1)[0];
          const a = rand(0, Math.PI * 2);
          const r = 120 + i * 30;
          state.actors.push(createActor("bot-" + i, name, cx + Math.cos(a) * r, cy + Math.sin(a) * r, false));
        }
      }

      function resetRound() {
        state.phase = "start";
        state.worldTimeSec = 0;
        state.nowSec = 0;
        state.joinStartSec = 0;
        state.startFxStartSec = 0;
        state.playingStartSec = 0;
        state.camera.x = CONFIG.MAP_W * 0.5;
        state.camera.y = CONFIG.MAP_H * 0.5;
        state.camera.zoom = CONFIG.CAMERA_ZOOM_START;
        state.respawnAcc = 0;
        state.joinFeed.length = 0;
        state.rankArrival = {};
        state.ranks = [];
        state.particles = [];
        state.lowFx = false;
        state.lowFxAccSec = 0;
        state.comboPopUntil = 0;
        initActors();
        initDots();
        applyPhaseVisibility();
      }

      function applyPhaseVisibility() {
        els.startShell.classList.toggle("hidden", state.phase !== "start");
        els.joinShell.classList.toggle("hidden", state.phase !== "join");
        els.startFxShell.classList.toggle("hidden", state.phase !== "startfx");
        els.resultShell.classList.toggle("hidden", state.phase !== "result");
      }

      function startJoin() {
        state.phase = "join";
        state.joinStartSec = state.worldTimeSec;
        state.joinFeed.length = 0;
        for (const a of state.actors) {
          if (a.isPlayer) {
            a.joined = true;
            a.joining = false;
          } else {
            a.joined = false;
            a.joining = false;
            a.joinAtSec = rand(0.4, Math.min(4.4, CONFIG.JOIN_TOTAL_SEC - 0.2));
          }
        }
        renderJoinFeed();
        applyPhaseVisibility();
      }

      function startFxPhase() {
        state.phase = "startfx";
        state.startFxStartSec = state.worldTimeSec;
        applyPhaseVisibility();
      }

      function startPlaying() {
        state.phase = "playing";
        state.playingStartSec = state.worldTimeSec;
        applyPhaseVisibility();
      }

      function finishRound() {
        state.phase = "result";
        updateRanks();
        const me = state.actors.find((a) => a.id === state.playerId);
        const rank = state.ranks.findIndex((r) => r.id === state.playerId) + 1;
        els.resultTop.textContent = "최종 " + rank + "위 · 점수 " + Math.floor(me.score);
        els.resultList.textContent = "";
        for (let i = 0; i < state.ranks.length; i += 1) {
          const r = state.ranks[i];
          const li = document.createElement("li");
          li.textContent = (i + 1) + ". " + r.name + " - " + Math.floor(r.score);
          li.style.color = r.id === state.playerId ? "#ffde5d" : "#d5deff";
          li.style.fontWeight = r.id === state.playerId ? "800" : "500";
          els.resultList.appendChild(li);
        }
        applyPhaseVisibility();
      }

      function syncFullscreenButtonLabel() {
        els.fullscreenBtn.textContent = document.fullscreenElement ? "창화면" : "전체화면";
      }

      function toggleFullscreen() {
        if (!document.fullscreenEnabled || !app.requestFullscreen) {
          els.fullscreenNote.textContent = "이 기기/브라우저에서는 전체화면을 지원하지 않습니다.";
          return;
        }
        if (!document.fullscreenElement) {
          app.requestFullscreen().catch(() => {
            els.fullscreenNote.textContent = "전체화면 전환에 실패했습니다.";
          });
        } else {
          document.exitFullscreen().catch(() => {});
        }
      }

      function updateRanks() {
        const list = state.actors.map((a) => ({
          id: a.id,
          name: a.name,
          score: a.score,
          arrival: state.rankArrival[a.id] ?? Infinity
        }));
        list.sort((a, b) => {
          const ds = b.score - a.score;
          if (Math.abs(ds) > 1e-6) return ds;
          return a.arrival - b.arrival;
        });
        state.ranks = list;
      }

      function scoreEvent(actor, gain) {
        actor.score += gain;
        if (state.rankArrival[actor.id] == null) {
          state.rankArrival[actor.id] = state.worldTimeSec;
        }
      }

      function emitParticles(type, x, y) {
        const tier = CONFIG.PARTICLE_TIERS[type];
        if (!tier) return;
        const countMul = state.lowFx ? 0.7 : 1;
        const count = Math.max(1, Math.floor(rand(tier.count[0], tier.count[1]) * countMul));
        for (let i = 0; i < count && state.particles.length < CONFIG.PARTICLE_MAX; i += 1) {
          const a = rand(0, Math.PI * 2);
          const sp = rand(tier.speed[0], tier.speed[1]);
          state.particles.push({
            x, y,
            vx: Math.cos(a) * sp,
            vy: Math.sin(a) * sp,
            life: rand(tier.life[0], tier.life[1]),
            age: 0,
            sparkR: rand(tier.spark[0], tier.spark[1]),
            shardR: rand(tier.shard[0], tier.shard[1]),
            color: CONFIG.DOT_SPEC[type].color
          });
        }
      }

      function spawnReboundNormals(actor, lost) {
        if (lost <= 0) return;
        const count = clamp(Math.floor(lost / 10), 3, 20);
        for (let i = 0; i < count; i += 1) {
          const a = rand(0, Math.PI * 2);
          const sp = rand(CONFIG.HAZARD_REBOUND_SPEED_MIN, CONFIG.HAZARD_REBOUND_SPEED_MAX);
          const d = createDot("normal", actor.x, actor.y, {
            rebound: true,
            collectableAtSec: state.worldTimeSec + CONFIG.HAZARD_REBOUND_LOCK_SEC
          });
          d.vx = Math.cos(a) * sp;
          d.vy = Math.sin(a) * sp;
          state.dots.push(d);
        }
      }

      function collectDot(actor, dot) {
        if (dot.type === "hazard") {
          const lost = Math.min(actor.score, Math.floor(actor.score * 0.05));
          actor.score -= lost;
          actor.flashHazardUntil = state.worldTimeSec + 0.45;
          spawnReboundNormals(actor, lost);
          emitParticles("hazard", dot.x, dot.y);
          return;
        }

        const mul = actor.isPlayer ? CONFIG.SCORE_MUL_PLAYER : CONFIG.SCORE_MUL_BOT;
        const gain = (dot.base + actor.combo * 2) * mul;
        scoreEvent(actor, gain);
        actor.combo = Math.min(999, actor.combo + dot.comboGain);
        actor.chainCount += 1;
        actor.scaleLevel = Math.min(CONFIG.SCALE_MAX, actor.scaleLevel + dot.comboGain * CONFIG.SCALE_GAIN_FACTOR);
        actor.lastCollectSec = state.worldTimeSec;
        if (dot.type === "fever") {
          actor.feverUntil = state.worldTimeSec + CONFIG.FEVER_SEC;
        }
        emitParticles(dot.type, dot.x, dot.y);
        if (actor.isPlayer) {
          const stage = comboStageScale(actor.combo);
          state.comboPopFrom = stage * 2;
          state.comboPopTo = stage;
          state.comboPopUntil = state.worldTimeSec + 0.18;
        }
      }

      function updateJoinPhase() {
        const t = state.worldTimeSec - state.joinStartSec;
        const p = clamp(t / CONFIG.JOIN_TOTAL_SEC, 0, 1);
        els.joinProgress.style.width = (p * 100).toFixed(1) + "%";
        const remain = Math.max(0, Math.ceil(CONFIG.JOIN_TOTAL_SEC - t));
        els.joinTime.textContent = "게임 시작까지 " + remain + "초";

        const me = state.actors.find((a) => a.id === state.playerId);
        const effectiveZoom = clamp(state.camera.zoom * state.view.scale, CONFIG.CAMERA_ZOOM_MIN, CONFIG.CAMERA_ZOOM_MAX);
        const halfW = state.view.w / (2 * effectiveZoom);
        const halfH = state.view.h / (2 * effectiveZoom);
        const camX = clamp(me.x, halfW, CONFIG.MAP_W - halfW);
        const camY = clamp(me.y, halfH, CONFIG.MAP_H - halfH);
        const left = camX - halfW;
        const right = camX + halfW;
        const top = camY - halfH;
        const bottom = camY + halfH;

        for (const a of state.actors) {
          if (a.isPlayer || a.joined || a.joining) continue;
          if (t < a.joinAtSec) continue;
          a.joining = true;
          a.joinSlideStartSec = state.worldTimeSec;
          const side = randInt(0, 3);
          const tx = clamp(me.x + rand(-190, 190), 30, CONFIG.MAP_W - 30);
          const ty = clamp(me.y + rand(-160, 160), 30, CONFIG.MAP_H - 30);
          a.joinTargetPos.x = tx;
          a.joinTargetPos.y = ty;
          if (side === 0) { a.joinStartPos.x = left - rand(40, 120); a.joinStartPos.y = rand(top, bottom); }
          if (side === 1) { a.joinStartPos.x = right + rand(40, 120); a.joinStartPos.y = rand(top, bottom); }
          if (side === 2) { a.joinStartPos.x = rand(left, right); a.joinStartPos.y = top - rand(40, 120); }
          if (side === 3) { a.joinStartPos.x = rand(left, right); a.joinStartPos.y = bottom + rand(40, 120); }
          a.x = a.joinStartPos.x;
          a.y = a.joinStartPos.y;
          state.joinFeed.unshift(a.name + " joined the match");
          if (state.joinFeed.length > 8) state.joinFeed.length = 8;
          renderJoinFeed();
        }

        for (const a of state.actors) {
          if (!a.joining) continue;
          const jt = clamp((state.worldTimeSec - a.joinSlideStartSec) / CONFIG.JOIN_SLIDE_SEC, 0, 1);
          const et = easeOutCubic(jt);
          a.x = lerp(a.joinStartPos.x, a.joinTargetPos.x, et);
          a.y = lerp(a.joinStartPos.y, a.joinTargetPos.y, et);
          if (jt >= 1) {
            a.joining = false;
            a.joined = true;
          }
        }

        if (t >= CONFIG.JOIN_TOTAL_SEC) {
          for (const a of state.actors) {
            if (!a.isPlayer) {
              a.joined = true;
              a.joining = false;
            }
          }
          startFxPhase();
        }
      }

      function updateStartFxPhase() {
        const t = state.worldTimeSec - state.startFxStartSec;
        let alpha = 1;
        if (t > 0.7) alpha = clamp(1 - ((t - 0.7) / (CONFIG.GAME_START_FX_SEC - 0.7)), 0, 1);
        els.startFxPanel.style.opacity = alpha.toFixed(3);
        if (t >= CONFIG.GAME_START_FX_SEC) startPlaying();
      }

      function updateActorDecay(actor, dt) {
        if (state.worldTimeSec - actor.lastCollectSec > CONFIG.SCALE_DECAY_DELAY) {
          actor.scaleLevel = Math.max(0, actor.scaleLevel - CONFIG.SCALE_DECAY_PER_SEC * dt);
        }
        if (state.worldTimeSec - actor.lastCollectSec > CONFIG.COMBO_CHAIN_SEC) {
          actor.combo = 0;
          actor.chainCount = 0;
        }
      }

      function chooseBotTarget(bot) {
        updateRanks();
        const rank = state.ranks.findIndex((r) => r.id === bot.id) + 1;
        let bestId = null;
        let bestVal = -Infinity;
        for (const d of state.dots) {
          if (d.type === "hazard") continue;
          if (d.collectableAtSec > state.worldTimeSec) continue;
          const dist = Math.hypot(d.x - bot.x, d.y - bot.y);
          const valueScore = d.base * 1.0;
          const distScore = -dist * 0.08;
          const catchupBonus = rank >= 3 ? 8 : 0;
          const total = valueScore + distScore + catchupBonus;
          if (total > bestVal) {
            bestVal = total;
            bestId = d.id;
          }
        }
        bot.aiTargetDotId = bestId;
      }

      function getPlayerDirection() {
        if (Math.abs(state.input.keyVec.x) > 0 || Math.abs(state.input.keyVec.y) > 0) {
          return { x: state.input.keyVec.x, y: state.input.keyVec.y };
        }
        return { x: state.input.joyVec.x, y: state.input.joyVec.y };
      }

      function updateActors(dt) {
        for (const a of state.actors) {
          if (!a.joined) continue;
          updateActorDecay(a, dt);
          let dir = { x: 0, y: 0 };
          if (a.isPlayer) {
            dir = getPlayerDirection();
          } else {
            a.aiRetargetAcc += dt;
            if (a.aiRetargetAcc >= 0.4 || !a.aiTargetDotId) {
              a.aiRetargetAcc = 0;
              chooseBotTarget(a);
            }
            const target = state.dots.find((d) => d.id === a.aiTargetDotId);
            if (target) {
              const n = norm(target.x - a.x, target.y - a.y);
              dir.x = n.x;
              dir.y = n.y;
            }
          }
          const feverMul = state.worldTimeSec < a.feverUntil ? (1 + CONFIG.FEVER_SPEED_BOOST) : 1;
          const speedMul = a.isPlayer ? CONFIG.PLAYER_SPEED_MUL : CONFIG.BOT_SPEED_MUL;
          const speed = CONFIG.BASE_SPEED * speedMul * feverMul;
          a.vx = dir.x * speed;
          a.vy = dir.y * speed;
          a.x = clamp(a.x + a.vx * dt, 0, CONFIG.MAP_W);
          a.y = clamp(a.y + a.vy * dt, 0, CONFIG.MAP_H);
        }
      }

      function updateDots(dt) {
        for (let i = state.dots.length - 1; i >= 0; i -= 1) {
          const d = state.dots[i];
          if (d.type === "chaser" || d.rebound) {
            d.x += d.vx * dt;
            d.y += d.vy * dt;
            if (d.x <= 0 || d.x >= CONFIG.MAP_W) {
              d.x = clamp(d.x, 0, CONFIG.MAP_W);
              d.vx *= -1;
            }
            if (d.y <= 0 || d.y >= CONFIG.MAP_H) {
              d.y = clamp(d.y, 0, CONFIG.MAP_H);
              d.vy *= -1;
            }
            if (d.rebound) {
              d.vx *= 0.94;
              d.vy *= 0.94;
              if (Math.hypot(d.vx, d.vy) < 15) d.rebound = false;
            }
          }
          if (state.worldTimeSec > d.expirySec) {
            state.dots.splice(i, 1);
          }
        }

        for (const a of state.actors) {
          if (!a.joined) continue;
          const feverMul = state.worldTimeSec < a.feverUntil ? (1 + CONFIG.FEVER_RADIUS_BOOST) : 1;
          const catchR = (actorRadius(a) + 14) * feverMul;
          for (let i = state.dots.length - 1; i >= 0; i -= 1) {
            const d = state.dots[i];
            if (d.collectableAtSec > state.worldTimeSec) continue;
            if (Math.hypot(a.x - d.x, a.y - d.y) <= catchR) {
              collectDot(a, d);
              state.dots.splice(i, 1);
            }
          }
        }

        state.respawnAcc += dt;
        while (state.respawnAcc >= CONFIG.RESPAWN_TICK) {
          state.respawnAcc -= CONFIG.RESPAWN_TICK;
          const deficit = CONFIG.DOT_MIN - state.dots.length;
          if (deficit > 0) {
            for (let i = 0; i < deficit; i += 1) spawnDot();
          } else if (state.dots.length < CONFIG.DOT_MAX && Math.random() < 0.55) {
            spawnDot();
          }
        }
      }

      function updateParticles(dt) {
        for (let i = state.particles.length - 1; i >= 0; i -= 1) {
          const p = state.particles[i];
          p.age += dt;
          if (p.age >= p.life) {
            state.particles.splice(i, 1);
            continue;
          }
          p.vx *= 0.93;
          p.vy *= 0.93;
          p.x += p.vx * dt;
          p.y += p.vy * dt;
        }
      }

      function updateCamera() {
        const me = state.actors.find((a) => a.id === state.playerId);
        const targetZoomRaw = (1 / (1 + me.scaleLevel * 0.007)) * 1.3;
        const targetZoom = clamp(targetZoomRaw, CONFIG.CAMERA_ZOOM_MIN, CONFIG.CAMERA_ZOOM_MAX);
        state.camera.zoom = lerp(state.camera.zoom, targetZoom, CONFIG.CAMERA_LERP);
        const effectiveZoom = clamp(state.camera.zoom * state.view.scale, CONFIG.CAMERA_ZOOM_MIN, CONFIG.CAMERA_ZOOM_MAX);
        const halfW = state.view.w / (2 * effectiveZoom);
        const halfH = state.view.h / (2 * effectiveZoom);
        state.camera.x = clamp(me.x, halfW, CONFIG.MAP_W - halfW);
        state.camera.y = clamp(me.y, halfH, CONFIG.MAP_H - halfH);
      }

      function updateLowFx(dt) {
        if (state.fps < CONFIG.LOW_FPS_THRESHOLD) {
          state.lowFxAccSec += dt;
          if (state.lowFxAccSec >= CONFIG.LOW_FPS_HOLD_SEC) state.lowFx = true;
        } else {
          state.lowFxAccSec = Math.max(0, state.lowFxAccSec - dt * 0.5);
          if (state.lowFxAccSec === 0) state.lowFx = false;
        }
      }

      function drawGrid() {
        const z = clamp(state.camera.zoom * state.view.scale, 0.2, 3);
        ctx.strokeStyle = "rgba(120,145,255,0.09)";
        ctx.lineWidth = 1 / z;
        for (let x = 0; x <= CONFIG.MAP_W; x += 100) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, CONFIG.MAP_H);
          ctx.stroke();
        }
        for (let y = 0; y <= CONFIG.MAP_H; y += 100) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(CONFIG.MAP_W, y);
          ctx.stroke();
        }
      }

      function drawDots() {
        const t = state.worldTimeSec;
        for (const d of state.dots) {
          if (d.type === "hazard") {
            const pulse = 1 + Math.sin(t * 8) * 0.12;
            const size = 16 * pulse;
            ctx.fillStyle = "#ff4f59";
            ctx.shadowColor = "#ff4f59";
            ctx.beginPath();
            ctx.moveTo(d.x, d.y - size);
            ctx.lineTo(d.x - size * 0.85, d.y + size * 0.7);
            ctx.lineTo(d.x + size * 0.85, d.y + size * 0.7);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = "rgba(255,90,98,0.5)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(d.x, d.y, 24 + Math.sin(t * 7) * 3, 0, Math.PI * 2);
            ctx.stroke();
            continue;
          }
          const size = d.type === "bonus" ? 14 : d.type === "fever" ? 15 : d.type === "chaser" ? 13 : 12;
          ctx.fillStyle = d.color;
          ctx.shadowColor = d.color;
          ctx.fillRect(d.x - size * 0.5, d.y - size * 0.5, size, size);
        }
      }

      function drawParticles() {
        for (const p of state.particles) {
          const k = 1 - p.age / p.life;
          ctx.globalAlpha = k;
          ctx.fillStyle = p.color;
          ctx.shadowColor = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.sparkR * k, 0, Math.PI * 2);
          ctx.fill();
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(Math.atan2(p.vy, p.vx));
          ctx.fillRect(-p.shardR * 0.5 * k, -1.2 * k, p.shardR * k, 2.4 * k);
          ctx.restore();
          ctx.globalAlpha = 1;
        }
      }

      function drawCrown(x, bottomY, size) {
        const topY = bottomY - size;
        const baseH = size * 0.24;
        const baseY = bottomY - baseH;
        const left = x - size;
        const right = x + size;
        ctx.save();
        ctx.shadowColor = "rgba(255, 212, 79, 0.85)";
        ctx.shadowBlur = Math.max(3, size * 0.45);

        ctx.fillStyle = "#ffd85a";
        ctx.strokeStyle = "#fff0a8";
        ctx.lineWidth = Math.max(1, size * 0.12);
        ctx.beginPath();
        ctx.moveTo(left, baseY);
        ctx.lineTo(x - size * 0.62, topY + size * 0.46);
        ctx.lineTo(x - size * 0.28, topY + size * 0.74);
        ctx.lineTo(x, topY);
        ctx.lineTo(x + size * 0.28, topY + size * 0.74);
        ctx.lineTo(x + size * 0.62, topY + size * 0.46);
        ctx.lineTo(right, baseY);
        ctx.lineTo(right, bottomY);
        ctx.lineTo(left, bottomY);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "rgba(255, 245, 175, 0.85)";
        ctx.fillRect(left + size * 0.16, baseY + baseH * 0.16, size * 1.68, baseH * 0.34);

        ctx.fillStyle = "#66d4ff";
        ctx.beginPath();
        ctx.arc(x, baseY + baseH * 0.5, size * 0.13, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#ff7eb6";
        ctx.beginPath();
        ctx.arc(x - size * 0.46, baseY + baseH * 0.54, size * 0.09, 0, Math.PI * 2);
        ctx.arc(x + size * 0.46, baseY + baseH * 0.54, size * 0.09, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawActors() {
        updateRanks();
        const firstId = state.ranks.length ? state.ranks[0].id : "";
        const z = clamp(state.camera.zoom * state.view.scale, 0.2, 3);
        const inv = 1 / z;
        for (const a of state.actors) {
          if (!a.joined && !a.joining) continue;
          const r = actorRadius(a);
          const fever = state.worldTimeSec < a.feverUntil;
          const flash = state.worldTimeSec < a.flashHazardUntil;
          const color = flash ? "#ff4f59" : a.isPlayer ? "#ffd86b" : (fever ? "#9b7bff" : "#7cc0ff");
          ctx.fillStyle = color;
          ctx.shadowColor = color;
          ctx.beginPath();
          ctx.arc(a.x, a.y, r, 0, Math.PI * 2);
          ctx.fill();

          const nameSize = 13 * inv;
          const labelBaseline = a.y - r - 10 * inv;
          ctx.font = "700 " + nameSize.toFixed(2) + "px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', Arial, sans-serif";
          const m = ctx.measureText(a.name);
          const tw = m.width;
          const asc = m.actualBoundingBoxAscent || nameSize * 0.78;
          const labelTop = labelBaseline - asc;
          if (a.id === firstId) {
            const crownGap = Math.max(8 * inv, 2);
            const crownSize = 14 * inv;
            const crownBottom = labelTop - crownGap;
            drawCrown(a.x, crownBottom, crownSize);
          }
          ctx.fillStyle = a.isPlayer ? "#ffde5d" : "#eaf0ff";
          ctx.shadowColor = "rgba(0,0,0,0.2)";
          ctx.fillText(a.name, a.x - tw * 0.5, labelBaseline);
        }
      }

      function renderWorld() {
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        ctx.fillStyle = "#050512";
        ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
        ctx.fillStyle = "rgba(0,0,0,0.28)";
        if (state.view.y > 0) {
          ctx.fillRect(0, 0, window.innerWidth, state.view.y);
          ctx.fillRect(0, state.view.y + state.view.h, window.innerWidth, window.innerHeight - (state.view.y + state.view.h));
        }
        if (state.view.x > 0) {
          ctx.fillRect(0, 0, state.view.x, window.innerHeight);
          ctx.fillRect(state.view.x + state.view.w, 0, window.innerWidth - (state.view.x + state.view.w), window.innerHeight);
        }

        ctx.save();
        ctx.beginPath();
        ctx.rect(state.view.x, state.view.y, state.view.w, state.view.h);
        ctx.clip();
        ctx.translate(state.view.x + state.view.w * 0.5, state.view.y + state.view.h * 0.5);
        const effectiveZoom = clamp(state.camera.zoom * state.view.scale, CONFIG.CAMERA_ZOOM_MIN, CONFIG.CAMERA_ZOOM_MAX);
        ctx.scale(effectiveZoom, effectiveZoom);
        ctx.translate(-state.camera.x, -state.camera.y);

        ctx.fillStyle = "#0b0b1a";
        ctx.fillRect(0, 0, CONFIG.MAP_W, CONFIG.MAP_H);
        drawGrid();

        ctx.globalCompositeOperation = "lighter";
        ctx.shadowBlur = state.lowFx ? 10 : 16;
        drawDots();
        drawParticles();
        ctx.globalCompositeOperation = "source-over";
        ctx.shadowBlur = 0;

        drawActors();
        ctx.restore();
      }

      function comboStageScale(combo) {
        if (combo <= 15) return 1.0;
        if (combo <= 30) return 1.1;
        if (combo <= 45) return 1.2;
        if (combo <= 60) return 1.3;
        return 1.4;
      }

      function comboColor(combo) {
        if (combo <= 15) return "#ffffff";
        if (combo <= 30) return "#71a8ff";
        if (combo <= 45) return "#ffe665";
        if (combo <= 60) return "#ff655f";
        return "#d58bff";
      }

      function renderRanking() {
        if (state.phase !== "playing") return;
        updateRanks();
        const pad = 12 * state.view.scale;
        const lineH = 26 * state.view.scale * 1.2;
        const fontPx = 22 * state.view.scale * 1.2;
        ctx.save();
        ctx.font = "700 " + fontPx.toFixed(2) + "px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', Arial, sans-serif";
        const lines = [];
        for (let i = 0; i < state.ranks.length; i += 1) {
          const r = state.ranks[i];
          lines.push({ text: (i + 1) + ". " + r.name + "  " + Math.floor(r.score), you: r.id === state.playerId });
        }
        const textW = lines.reduce((m, l) => Math.max(m, ctx.measureText(l.text).width), 0);
        const panelW = textW + pad * 2;
        const panelH = lines.length * lineH + pad * 2;
        let x = state.view.x + 16 * state.view.scale;
        let y = state.view.y + 16 * state.view.scale;
        x = clamp(x, state.view.x, state.view.x + state.view.w - panelW);
        y = clamp(y, state.view.y, state.view.y + state.view.h - panelH);
        ctx.fillStyle = "rgba(10,14,28,0.78)";
        ctx.strokeStyle = "rgba(143,162,255,0.45)";
        ctx.lineWidth = Math.max(1, 1.2 * state.view.scale);
        ctx.beginPath();
        ctx.roundRect(x, y, panelW, panelH, 12 * state.view.scale);
        ctx.fill();
        ctx.stroke();
        let sy = y + pad + lineH * 0.82;
        for (const l of lines) {
          ctx.fillStyle = l.you ? "#ffde5d" : "#eaf0ff";
          ctx.fillText(l.text, x + pad, sy);
          sy += lineH;
        }
        ctx.restore();
      }

      function renderHud() {
        if (state.phase !== "playing") return;
        const me = state.actors.find((a) => a.id === state.playerId);
        const elapsedMs = (state.worldTimeSec - state.playingStartSec) * 1000;
        const leftMs = Math.max(0, CONFIG.SESSION_MS - elapsedMs);
        const tcx = state.view.x + state.view.w * 0.5;
        ctx.save();
        ctx.fillStyle = "#f4f7ff";
        ctx.font = "800 " + (42 * state.view.scale).toFixed(2) + "px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', Arial, sans-serif";
        const secText = (Math.ceil(leftMs / 100) / 10).toFixed(1);
        const tw = ctx.measureText(secText).width;
        ctx.fillText(secText, tcx - tw * 0.5, state.view.y + 48 * state.view.scale);
        if (me.combo > 0) {
          const base = 22.5 * state.view.scale;
          const stage = comboStageScale(me.combo);
          let pop = 1;
          if (state.worldTimeSec < state.comboPopUntil) {
            const p = 1 - (state.comboPopUntil - state.worldTimeSec) / 0.18;
            pop = lerp(state.comboPopFrom / stage, state.comboPopTo / stage, clamp(p, 0, 1));
          }
          const fs = base * stage * pop;
          ctx.font = "900 " + fs.toFixed(2) + "px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', Arial, sans-serif";
          ctx.fillStyle = comboColor(me.combo);
          const comboText = "COMBO x" + me.combo;
          const cw = ctx.measureText(comboText).width;
          ctx.fillText(comboText, tcx - cw * 0.5, state.view.y + 170 * state.view.scale);
        }
        ctx.restore();
        renderRanking();
      }

      function renderJoystick() {
        if (state.phase !== "playing" || !state.input.pointerActive || !state.input.joyBase) return;
        const b = state.input.joyBase;
        const s = state.input.joyStick || b;
        ctx.save();
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = "rgba(140,155,255,0.23)";
        ctx.strokeStyle = "rgba(173,186,255,0.8)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(b.x, b.y, CONFIG.JOYSTICK_RADIUS_PX, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "rgba(220,230,255,0.85)";
        ctx.beginPath();
        ctx.arc(s.x, s.y, 26, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function renderJoinFeed() {
        els.joinFeed.textContent = "";
        for (const line of state.joinFeed) {
          const li = document.createElement("li");
          li.textContent = line;
          els.joinFeed.appendChild(li);
        }
      }

      function setupInput() {
        const pressed = new Set();
        function syncKeys() {
          let x = 0;
          let y = 0;
          if (pressed.has("KeyA") || pressed.has("ArrowLeft")) x -= 1;
          if (pressed.has("KeyD") || pressed.has("ArrowRight")) x += 1;
          if (pressed.has("KeyW") || pressed.has("ArrowUp")) y -= 1;
          if (pressed.has("KeyS") || pressed.has("ArrowDown")) y += 1;
          if (x === 0 && y === 0) {
            state.input.keyVec.x = 0;
            state.input.keyVec.y = 0;
            return;
          }
          const n = norm(x, y);
          state.input.keyVec.x = n.x;
          state.input.keyVec.y = n.y;
        }
        window.addEventListener("keydown", (e) => {
          if (["KeyW", "KeyA", "KeyS", "KeyD", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) {
            pressed.add(e.code);
            syncKeys();
            e.preventDefault();
          }
        });
        window.addEventListener("keyup", (e) => {
          if (pressed.delete(e.code)) {
            syncKeys();
            e.preventDefault();
          }
        });

        canvas.addEventListener("pointerdown", (e) => {
          if (state.phase !== "playing") return;
          state.input.pointerActive = true;
          state.input.pointerId = e.pointerId;
          state.input.joyBase = { x: e.clientX, y: e.clientY };
          state.input.joyStick = { x: e.clientX, y: e.clientY };
          canvas.setPointerCapture(e.pointerId);
        });

        canvas.addEventListener("pointermove", (e) => {
          if (!state.input.pointerActive || e.pointerId !== state.input.pointerId) return;
          const base = state.input.joyBase;
          let dx = e.clientX - base.x;
          let dy = e.clientY - base.y;
          const n = norm(dx, dy);
          const d = Math.min(CONFIG.JOYSTICK_RADIUS_PX, n.m);
          dx = n.x * d;
          dy = n.y * d;
          state.input.joyStick = { x: base.x + dx, y: base.y + dy };
          state.input.joyVec.x = dx / CONFIG.JOYSTICK_RADIUS_PX;
          state.input.joyVec.y = dy / CONFIG.JOYSTICK_RADIUS_PX;
        });

        function endPointer(e) {
          if (e.pointerId !== state.input.pointerId) return;
          state.input.pointerActive = false;
          state.input.pointerId = -1;
          state.input.joyBase = null;
          state.input.joyStick = null;
          state.input.joyVec.x = 0;
          state.input.joyVec.y = 0;
        }
        canvas.addEventListener("pointerup", endPointer);
        canvas.addEventListener("pointercancel", endPointer);
      }

      function update(dt) {
        updateLowFx(dt);
        syncOverlayScale();
        if (state.phase === "join") {
          updateJoinPhase();
          return;
        }
        if (state.phase === "startfx") {
          updateStartFxPhase();
          return;
        }
        if (state.phase !== "playing") return;

        updateActors(dt);
        updateDots(dt);
        updateParticles(dt);
        updateCamera();
        const elapsed = (state.worldTimeSec - state.playingStartSec) * 1000;
        if (elapsed >= CONFIG.SESSION_MS) finishRound();
      }

      function frame(ts) {
        const now = ts / 1000;
        const dt = Math.min(0.05, Math.max(0.001, now - state.nowSec || 0.016));
        state.nowSec = now;
        state.worldTimeSec += dt;
        state.fps = 1 / dt;
        update(dt);
        renderWorld();
        renderHud();
        renderJoystick();
        requestAnimationFrame(frame);
      }

      function bindUi() {
        els.startBtn.addEventListener("click", () => {
          els.fullscreenNote.textContent = "";
          startJoin();
        });
        els.fullscreenBtn.addEventListener("click", () => {
          toggleFullscreen();
          syncFullscreenButtonLabel();
        });
        els.restartBtn.addEventListener("click", resetRound);
        document.addEventListener("fullscreenchange", syncFullscreenButtonLabel);
      }

      function boot() {
        resize();
        bindUi();
        setupInput();
        resetRound();
        syncOverlayScale();
        syncFullscreenButtonLabel();
        requestAnimationFrame(frame);
      }

      window.addEventListener("resize", resize);
      boot();
    })();
  </script>
</body>
</html>
