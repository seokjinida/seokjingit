<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Neon Pop Sweeper (Dynamic Vision)</title>
  <style>
    :root {
      --bg-page: #050512;
      --bg-world: #0b0b1a;
      --panel: rgba(14, 18, 40, 0.86);
      --panel-border: rgba(102, 170, 255, 0.45);
      --text: #eaf2ff;
      --muted: #98a8d8;
      --accent: #66f5ff;
      --danger: #ff496e;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-page);
      color: var(--text);
      font-family: Inter, "Pretendard", "Noto Sans KR", sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    #app { position: relative; width: 100%; height: 100%; }
    #gameCanvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 20;
    }
    .overlay.show { display: flex; }
    .card {
      pointer-events: auto;
      width: min(88vw, 640px);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45), 0 0 32px rgba(94, 173, 255, 0.28);
      padding: 28px 26px;
      transform-origin: center center;
      text-align: center;
    }
    h1, h2, p { margin: 0; }
    .title { font-size: 34px; font-weight: 800; letter-spacing: 0.4px; }
    .sub { margin-top: 10px; color: var(--muted); line-height: 1.5; }
    .row { display: flex; gap: 10px; margin-top: 22px; flex-wrap: wrap; justify-content: center; }
    .btn {
      border: 1px solid rgba(119, 196, 255, 0.58);
      background: rgba(21, 42, 81, 0.84);
      color: #eff7ff;
      padding: 12px 16px;
      border-radius: 11px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn.primary {
      background: linear-gradient(145deg, #2d72ff, #23b7ff);
      border-color: rgba(198, 230, 255, 0.78);
      color: #fff;
    }
    #hud {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
    }
    #timer {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 34px;
      font-weight: 900;
      text-shadow: 0 0 16px rgba(129, 235, 255, 0.76);
    }
    #comboText {
      position: absolute;
      top: 170px;
      left: 50%;
      transform: translateX(-50%);
      font-weight: 900;
      font-size: 26px;
      text-shadow: 0 0 14px rgba(255, 255, 255, 0.58);
      opacity: 0;
      transition: transform 0.12s ease, opacity 0.12s linear;
      white-space: nowrap;
    }
    #ranking {
      position: absolute;
      top: 22px;
      right: 20px;
      width: 306px;
      background: rgba(12, 17, 38, 0.8);
      border: 1px solid rgba(116, 180, 255, 0.5);
      border-radius: 14px;
      padding: 12px 14px;
      transform-origin: top right;
    }
    #ranking h3 {
      margin: 0 0 8px;
      font-size: 18px;
      letter-spacing: 0.3px;
      color: #d5ebff;
    }
    .rankLine {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 15px;
      padding: 5px 0;
      border-bottom: 1px dashed rgba(112, 141, 206, 0.3);
    }
    .rankLine:last-child { border-bottom: 0; }
    .rankName.you { color: #ffe27f; font-weight: 900; }
    #startOverlay {
      justify-content: center;
    }
    #startBlock {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      transform-origin: center center;
      pointer-events: auto;
    }
    #startCard { text-align: center; }
    #startBottomActions { pointer-events: auto; }
    #joinOverlay .card { width: min(90vw, 720px); }
    #joinProgressWrap {
      margin-top: 14px;
      width: 100%;
      height: 14px;
      border-radius: 999px;
      background: rgba(129, 168, 255, 0.2);
      overflow: hidden;
      border: 1px solid rgba(110, 154, 255, 0.4);
    }
    #joinProgress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #52f4ff, #4f8dff);
    }
    #joinFeed {
      margin-top: 14px;
      min-height: 78px;
      max-height: 148px;
      overflow: hidden;
      color: #d7e8ff;
      font-size: 14px;
      line-height: 1.5;
    }
    #startFxText {
      font-size: min(9vw, 92px);
      font-weight: 900;
      color: #dff7ff;
      text-shadow: 0 0 28px rgba(97, 238, 255, 0.8);
      opacity: 0;
      transform: scale(0.86);
    }
    #resultOverlay .card h2 { font-size: 32px; margin-bottom: 12px; }
    #resultList { margin: 10px 0 0; padding: 0; list-style: none; }
    #resultList li {
      display: flex;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px dashed rgba(110, 140, 210, 0.35);
    }
    #resultList li.you { color: #ffe27f; font-weight: 900; }
    .hint { margin-top: 10px; color: var(--muted); font-size: 13px; text-align: center; }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas"></canvas>

    <div id="hud">
      <div id="timer">60.0</div>
      <div id="comboText">COMBO x0</div>
      <section id="ranking">
        <h3>RANKING</h3>
        <div id="rankingBody"></div>
      </section>
    </div>

    <section id="startOverlay" class="overlay show">
      <div id="startBlock">
        <div class="card" id="startCard">
          <h1 class="title">Neon Pop Sweeper</h1>
          <p class="sub">
            60초 동안 네온 닷을 모아 최고 점수를 노리세요.<br />
            이동: 드래그 조이스틱 / WASD / 방향키
          </p>
          <div class="row">
            <button id="startBtn" class="btn primary">게임 시작</button>
          </div>
          <p class="hint">전체화면은 선택 사항이며, 게임 시작 버튼과 별개로 동작합니다.</p>
        </div>
        <div id="startBottomActions">
          <button id="fullscreenBtn" class="btn">전체화면</button>
        </div>
      </div>
    </section>

    <section id="joinOverlay" class="overlay">
      <div class="card" id="joinCard">
        <h2>참가자 입장 중...</h2>
        <p class="sub" id="joinCountdown">게임 시작까지 5초</p>
        <div id="joinProgressWrap"><div id="joinProgress"></div></div>
        <div id="joinFeed"></div>
      </div>
    </section>

    <section id="startFxOverlay" class="overlay">
      <div id="startFxText">게임 시작!</div>
    </section>

    <section id="resultOverlay" class="overlay">
      <div class="card" id="resultCard">
        <h2>라운드 종료</h2>
        <ul id="resultList"></ul>
        <div class="row">
          <button id="restartBtn" class="btn primary">Restart</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    "use strict";

    const CONFIG = {
      SESSION_MS: 60000,
      MAP_W: 2000,
      MAP_H: 2000,
      BASE_SPEED: 220,
      PLAYER_SPEED_MUL: 1.0,
      BOT_SPEED_MUL: 0.88,
      PLAYER_GAIN_MUL: 1.82,
      BOT_GAIN_MUL: 0.9,
      MAX_COMBO: 999,
      MAX_SCALE_LEVEL: 50,
      SCALE_GAIN_MUL: 0.35,
      COMBO_DECAY_DELAY_MS: 1200,
      COMBO_DECAY_PER_SEC: 5,
      SCALE_DECAY_DELAY_MS: 1200,
      SCALE_DECAY_PER_SEC: 5,
      CHAIN_WINDOW_MS: 600,
      FEVER_MS: 2500,
      PICKUP_OFFSET: 14,
      DOT_MIN: 220,
      DOT_MAX: 280,
      HAZARD_MAX_ACTIVE: 3,
      DOT_RESPAWN_INTERVAL_MS: 250,
      DOT_SPAWN_SAFE_RADIUS: 120,
      JOIN_TOTAL_MS: 5000,
      JOIN_MIN_MS: 400,
      JOIN_MAX_MS: 4400,
      JOIN_SLIDE_MS: 650,
      GAME_START_FX_MS: 1800,
      CHASER_SPEED_MIN: 78,
      CHASER_SPEED_MAX: 104,
      CHASER_LIFE_MIN_MS: 6000,
      CHASER_LIFE_MAX_MS: 8000,
      AI_HAZARD_DETECT_RADIUS: 230,
      AI_HAZARD_AVOID_CHANCE: 0.68,
      HAZARD_LOSS_RATE: 0.05,
      HAZARD_LAUNCH_MS: 1150,
      MAX_PARTICLES: 140,
      TARGET_FPS_DROP: 45
    };

    const DOT_TYPES = [
      { id: "normal", weight: 82, base: 10, comboGain: 1, color: "#35f7ff" },
      { id: "bonus", weight: 12, base: 25, comboGain: 2, color: "#8dff73" },
      { id: "fever", weight: 3, base: 40, comboGain: 4, color: "#ff67de" },
      { id: "chaser", weight: 2, base: 55, comboGain: 5, color: "#ae78ff" },
      { id: "hazard", weight: 1, base: 0, comboGain: 0, color: "#ff416b" }
    ];

    const BOT_NAME_POOL = ["NeoFox", "MintBug", "RinRin", "JAY_92", "Lumi", "Skyle", "Ariu", "NoraQ"];

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const els = {
      startOverlay: document.getElementById("startOverlay"),
      startBlock: document.getElementById("startBlock"),
      joinOverlay: document.getElementById("joinOverlay"),
      startFxOverlay: document.getElementById("startFxOverlay"),
      resultOverlay: document.getElementById("resultOverlay"),
      startCard: document.getElementById("startCard"),
      joinCard: document.getElementById("joinCard"),
      resultCard: document.getElementById("resultCard"),
      timer: document.getElementById("timer"),
      comboText: document.getElementById("comboText"),
      ranking: document.getElementById("ranking"),
      rankingBody: document.getElementById("rankingBody"),
      joinCountdown: document.getElementById("joinCountdown"),
      joinProgress: document.getElementById("joinProgress"),
      joinFeed: document.getElementById("joinFeed"),
      startFxText: document.getElementById("startFxText"),
      resultList: document.getElementById("resultList"),
      startBottomActions: document.getElementById("startBottomActions"),
      startBtn: document.getElementById("startBtn"),
      restartBtn: document.getElementById("restartBtn"),
      fullscreenBtn: document.getElementById("fullscreenBtn")
    };

    let dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
    let gameView = { x: 0, y: 0, width: 1600, height: 900 };
    let viewScale = 1;

    const state = {
      phase: "start",
      now: performance.now(),
      lastFrame: performance.now(),
      startTime: 0,
      joinStart: 0,
      startFxStart: 0,
      fpsEMA: 60,
      lowFpsAccMs: 0,
      particleQualityMul: 1,
      actors: [],
      player: null,
      dots: [],
      particles: [],
      camX: CONFIG.MAP_W / 2,
      camY: CONFIG.MAP_H / 2,
      zoom: 3.0,
      targetZoom: 3.0,
      nextDotId: 1,
      nextParticleId: 1,
      rankings: [],
      uiChainUntil: 0,
      uiChainCount: 0,
      joinFeed: [],
      dotRespawnTick: 0,
      pointer: {
        active: false,
        id: null,
        sx: 0,
        sy: 0,
        x: 0,
        y: 0,
        nx: 0,
        ny: 0
      },
      keys: {
        up: false,
        down: false,
        left: false,
        right: false
      }
    };

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function rand(min, max) {
      return min + Math.random() * (max - min);
    }

    function randInt(min, max) {
      return Math.floor(rand(min, max + 1));
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function pickDotType() {
      const hazardCount = state.dots.filter((d) => d.type === "hazard").length;
      if (hazardCount >= CONFIG.HAZARD_MAX_ACTIVE) {
        const rollNoHazard = Math.random() * 99;
        let accNoHazard = 0;
        for (const t of DOT_TYPES) {
          if (t.id === "hazard") continue;
          accNoHazard += t.weight;
          if (rollNoHazard <= accNoHazard) return t.id;
        }
        return "normal";
      }

      const roll = Math.random() * 100;
      let acc = 0;
      for (const t of DOT_TYPES) {
        acc += t.weight;
        if (roll <= acc) return t.id;
      }
      return "normal";
    }

    function dotDef(type) {
      return DOT_TYPES.find((d) => d.id === type);
    }

    function actorRadius(actor) {
      return (15 + actor.scaleLevel * 1.0) * 2.0;
    }

    function actorPickupRadius(actor) {
      return actorRadius(actor) + CONFIG.PICKUP_OFFSET;
    }

    function resetRun() {
      state.actors = [];
      state.dots = [];
      state.particles = [];
      state.rankings = [];
      state.joinFeed = [];
      state.uiChainUntil = 0;
      state.uiChainCount = 0;
      state.dotRespawnTick = 0;
      state.nextDotId = 1;
      state.nextParticleId = 1;
      state.camX = CONFIG.MAP_W / 2;
      state.camY = CONFIG.MAP_H / 2;
      state.zoom = 3.0;
      state.targetZoom = 3.0;
      state.lowFpsAccMs = 0;
      state.particleQualityMul = 1;
      state.pointer.active = false;
      state.pointer.id = null;

      const player = makeActor("YOU", true, CONFIG.MAP_W * 0.5, CONFIG.MAP_H * 0.5);
      state.player = player;
      state.actors.push(player);

      const picked = [...BOT_NAME_POOL].sort(() => Math.random() - 0.5).slice(0, 3);
      for (let i = 0; i < 3; i++) {
        const angle = (Math.PI * 2 * i) / 3;
        const bot = makeActor(
          picked[i],
          false,
          CONFIG.MAP_W * 0.5 + Math.cos(angle) * 120,
          CONFIG.MAP_H * 0.5 + Math.sin(angle) * 120
        );
        bot.joined = false;
        bot.joinAtMs = rand(CONFIG.JOIN_MIN_MS, Math.min(CONFIG.JOIN_MAX_MS, CONFIG.JOIN_TOTAL_MS - 200));
        bot.joinPosStart = null;
        state.actors.push(bot);
      }

      for (let i = 0; i < CONFIG.DOT_MIN; i++) {
        state.dots.push(makeDot(pickDotType()));
      }
      refreshRankings();
    }

    function makeActor(name, isPlayer, x, y) {
      return {
        id: isPlayer ? "player" : "bot_" + Math.random().toString(36).slice(2, 8),
        name,
        isPlayer,
        x,
        y,
        vx: 0,
        vy: 0,
        score: 0,
        combo: 0,
        scaleLevel: 0,
        chainLastCollectMs: 0,
        lastCollectMs: 0,
        feverUntilMs: 0,
        lastScoreUpdateMs: performance.now(),
        targetDotId: null,
        aiRetargetMs: 0,
        aiWobblePhase: Math.random() * Math.PI * 2,
        aiJitterX: 0,
        aiJitterY: 0,
        aiJitterUntilMs: 0,
        aiHazardDecisionUntilMs: 0,
        aiAvoidHazardUntilMs: 0,
        aiAvoidX: 0,
        aiAvoidY: 0,
        joined: true,
        joinAtMs: 0,
        joinPosStart: null,
        joinTs: 0,
        flashUntilMs: 0
      };
    }

    function randomSpawnPoint() {
      return { x: rand(30, CONFIG.MAP_W - 30), y: rand(30, CONFIG.MAP_H - 30) };
    }

    function isSpawnSafe(pos) {
      for (const a of state.actors) {
        const dx = a.x - pos.x;
        const dy = a.y - pos.y;
        if (dx * dx + dy * dy < CONFIG.DOT_SPAWN_SAFE_RADIUS * CONFIG.DOT_SPAWN_SAFE_RADIUS) {
          return false;
        }
      }
      return true;
    }

    function makeDot(type) {
      const p = findSafeSpawn();
      const d = {
        id: state.nextDotId++,
        type,
        x: p.x,
        y: p.y,
        size: type === "hazard" ? 14 : type === "chaser" ? 12 : 10,
        vx: 0,
        vy: 0,
        lifeLeftMs: 0,
        launchUntilMs: 0,
        spawnedMs: performance.now()
      };
      if (type === "chaser") {
        const speed = rand(CONFIG.CHASER_SPEED_MIN, CONFIG.CHASER_SPEED_MAX);
        const a = rand(0, Math.PI * 2);
        d.vx = Math.cos(a) * speed;
        d.vy = Math.sin(a) * speed;
        d.lifeLeftMs = rand(CONFIG.CHASER_LIFE_MIN_MS, CONFIG.CHASER_LIFE_MAX_MS);
      }
      return d;
    }

    function findSafeSpawn() {
      for (let i = 0; i < 30; i++) {
        const p = randomSpawnPoint();
        if (isSpawnSafe(p)) return p;
      }
      return randomSpawnPoint();
    }

    function beginJoinPhase() {
      resetRun();
      state.phase = "join";
      state.joinStart = state.now;
      showOverlay("join");
      els.joinFeed.innerHTML = "";
      state.joinFeed.push("YOU 입장 완료");
      syncJoinFeed();
    }

    function beginStartFx() {
      state.phase = "startfx";
      state.startFxStart = state.now;
      showOverlay("startfx");
    }

    function beginPlaying() {
      state.phase = "playing";
      state.startTime = state.now;
      showOverlay("none");
    }

    function beginResult() {
      state.phase = "ended";
      showOverlay("result");
      refreshRankings();
      renderResultList();
    }

    function showOverlay(type) {
      els.startOverlay.classList.toggle("show", type === "start");
      els.joinOverlay.classList.toggle("show", type === "join");
      els.startFxOverlay.classList.toggle("show", type === "startfx");
      els.resultOverlay.classList.toggle("show", type === "result");
    }

    function syncJoinFeed() {
      els.joinFeed.innerHTML = state.joinFeed.slice(-6).map((line) => "<div>" + line + "</div>").join("");
    }

    function beginStartScreen() {
      state.phase = "start";
      showOverlay("start");
    }

    function refreshRankings() {
      state.rankings = [...state.actors].sort((a, b) => {
        if (Math.floor(a.score) !== Math.floor(b.score)) return Math.floor(b.score) - Math.floor(a.score);
        return a.lastScoreUpdateMs - b.lastScoreUpdateMs;
      });
    }

    function renderRankingPanel() {
      refreshRankings();
      const html = state.rankings.map((a, i) => {
        const you = a.isPlayer ? "you" : "";
        return (
          '<div class="rankLine">' +
          '<span class="rankName ' + you + '">' + (i + 1) + ". " + a.name + "</span>" +
          "<strong>" + Math.floor(a.score) + "</strong>" +
          "</div>"
        );
      }).join("");
      els.rankingBody.innerHTML = html;
    }

    function updateHudVisibility() {
      const showRanking = state.phase === "playing";
      els.ranking.style.display = showRanking ? "block" : "none";
    }

    function renderResultList() {
      const html = state.rankings.map((a, i) => {
        const cls = a.isPlayer ? "you" : "";
        return "<li class=\"" + cls + "\"><span>" + (i + 1) + "위 " + a.name + "</span><strong>" + Math.floor(a.score) + "</strong></li>";
      }).join("");
      els.resultList.innerHTML = html;
    }

    function getInputVec() {
      let kx = 0;
      let ky = 0;
      if (state.keys.left) kx -= 1;
      if (state.keys.right) kx += 1;
      if (state.keys.up) ky -= 1;
      if (state.keys.down) ky += 1;
      if (kx !== 0 || ky !== 0) {
        const len = Math.hypot(kx, ky) || 1;
        return { x: kx / len, y: ky / len };
      }
      return { x: state.pointer.nx, y: state.pointer.ny };
    }

    function updateJoin(dtMs) {
      const elapsed = state.now - state.joinStart;
      const ratio = clamp(elapsed / CONFIG.JOIN_TOTAL_MS, 0, 1);
      els.joinProgress.style.width = (ratio * 100).toFixed(2) + "%";
      const remainSec = Math.ceil((CONFIG.JOIN_TOTAL_MS - elapsed) / 1000);
      els.joinCountdown.textContent = "게임 시작까지 " + Math.max(0, remainSec) + "초";

      for (const bot of state.actors) {
        if (bot.isPlayer || bot.joined) continue;
        if (elapsed >= bot.joinAtMs) {
          bot.joined = true;
          bot.joinTs = state.now;
          const angle = rand(0, Math.PI * 2);
          bot.joinPosStart = {
            x: clamp(bot.x + Math.cos(angle) * 260, 20, CONFIG.MAP_W - 20),
            y: clamp(bot.y + Math.sin(angle) * 260, 20, CONFIG.MAP_H - 20)
          };
          state.joinFeed.push(bot.name + " 참가 완료");
          syncJoinFeed();
        }
      }

      updateWorld(dtMs, false);

      if (elapsed >= CONFIG.JOIN_TOTAL_MS) {
        beginStartFx();
      }
    }

    function updateStartFx() {
      const elapsed = state.now - state.startFxStart;
      const hold = 700;
      const fade = CONFIG.GAME_START_FX_MS - hold;
      let alpha = 1;
      if (elapsed <= hold) alpha = 1;
      else alpha = clamp(1 - (elapsed - hold) / fade, 0, 1);
      const scale = 0.86 + easeOutCubic(clamp(elapsed / 350, 0, 1)) * 0.2;
      els.startFxText.style.opacity = String(alpha);
      els.startFxText.style.transform = "scale(" + scale.toFixed(3) + ")";
      if (elapsed >= CONFIG.GAME_START_FX_MS) {
        beginPlaying();
      }
    }

    function updatePlaying(dtMs) {
      updateWorld(dtMs, true);
      const elapsed = state.now - state.startTime;
      const remainMs = Math.max(0, CONFIG.SESSION_MS - elapsed);
      els.timer.textContent = (remainMs / 1000).toFixed(1);
      if (elapsed >= CONFIG.SESSION_MS) {
        beginResult();
      }
    }

    function updateWorld(dtMs, allowInput) {
      const dt = dtMs / 1000;
      state.dotRespawnTick += dtMs;

      if (state.dotRespawnTick >= CONFIG.DOT_RESPAWN_INTERVAL_MS) {
        state.dotRespawnTick = 0;
        if (state.dots.length < CONFIG.DOT_MAX) {
          const need = CONFIG.DOT_MIN - state.dots.length;
          const spawnCount = need > 0 ? need : randInt(0, 2);
          for (let i = 0; i < spawnCount && state.dots.length < CONFIG.DOT_MAX; i++) {
            state.dots.push(makeDot(pickDotType()));
          }
        }
      }

      for (const a of state.actors) {
        const inactive = !a.isPlayer && !a.joined;
        if (inactive) continue;

        if (state.now - a.lastCollectMs > CONFIG.CHAIN_WINDOW_MS && a.combo > 0) {
          a.combo = 0;
        }
        if (state.now - a.lastCollectMs > CONFIG.SCALE_DECAY_DELAY_MS && a.scaleLevel > 0) {
          a.scaleLevel = Math.max(0, a.scaleLevel - CONFIG.SCALE_DECAY_PER_SEC * dt);
        }

        // Join/Start 이전에는 액터가 이동하지 않도록 고정한다.
        if (!allowInput) {
          a.vx = 0;
          a.vy = 0;
          continue;
        }

        let input = { x: 0, y: 0 };
        if (a.isPlayer) {
          input = allowInput ? getInputVec() : { x: 0, y: 0 };
        } else {
          input = updateBotInput(a);
        }
        const speedMul = a.isPlayer ? CONFIG.PLAYER_SPEED_MUL : CONFIG.BOT_SPEED_MUL;
        const feverMul = state.now < a.feverUntilMs ? 1.1 : 1.0;
        const speed = CONFIG.BASE_SPEED * speedMul * feverMul;
        a.vx = input.x * speed;
        a.vy = input.y * speed;
        a.x = clamp(a.x + a.vx * dt, 0, CONFIG.MAP_W);
        a.y = clamp(a.y + a.vy * dt, 0, CONFIG.MAP_H);
      }

      for (let i = state.dots.length - 1; i >= 0; i--) {
        const d = state.dots[i];
        if (d.type === "chaser") {
          d.lifeLeftMs -= dtMs;
          d.x += d.vx * dt;
          d.y += d.vy * dt;
          if (d.x < 8 || d.x > CONFIG.MAP_W - 8) d.vx *= -1;
          if (d.y < 8 || d.y > CONFIG.MAP_H - 8) d.vy *= -1;
          d.x = clamp(d.x, 8, CONFIG.MAP_W - 8);
          d.y = clamp(d.y, 8, CONFIG.MAP_H - 8);
          if (d.lifeLeftMs <= 0) {
            state.dots.splice(i, 1);
            continue;
          }
        } else if (state.now < d.launchUntilMs) {
          d.x += d.vx * dt;
          d.y += d.vy * dt;
          d.vx *= 0.96;
          d.vy *= 0.96;
          d.x = clamp(d.x, 8, CONFIG.MAP_W - 8);
          d.y = clamp(d.y, 8, CONFIG.MAP_H - 8);
        }
      }

      for (let i = state.dots.length - 1; i >= 0; i--) {
        const d = state.dots[i];
        if (state.now < d.launchUntilMs) continue;
        let collectedBy = null;
        for (const a of state.actors) {
          if (!a.isPlayer && !a.joined) continue;
          const pickR = actorPickupRadius(a) * (state.now < a.feverUntilMs ? 1.35 : 1);
          const dx = a.x - d.x;
          const dy = a.y - d.y;
          if (dx * dx + dy * dy <= pickR * pickR) {
            collectedBy = a;
            break;
          }
        }
        if (!collectedBy) continue;

        onCollectDot(collectedBy, d);
        state.dots.splice(i, 1);
      }

      updateParticles(dtMs);
      updateCamera();
      updateComboUI();
      renderRankingPanel();
    }

    function updateBotInput(bot) {
      if (state.now >= bot.aiRetargetMs || !state.dots.some((d) => d.id === bot.targetDotId)) {
        bot.aiRetargetMs = state.now + 400;
        let best = null;
        let bestScore = -Infinity;
        const rank = state.rankings.findIndex((a) => a.id === bot.id) + 1;
        const catchupBonus = rank >= 3 ? 8 : 0;
        for (const d of state.dots) {
          if (state.now < d.launchUntilMs) continue;
          const def = dotDef(d.type);
          const dx = d.x - bot.x;
          const dy = d.y - bot.y;
          const dist = Math.hypot(dx, dy);
          const total = def.base * 1.0 - dist * 0.08 + catchupBonus;
          if (total > bestScore) {
            bestScore = total;
            best = d;
          }
        }
        bot.targetDotId = best ? best.id : null;
      }
      const target = state.dots.find((d) => d.id === bot.targetDotId);

      // Hazard 감지 시, 일정 확률로 짧은 회피 상태를 활성화한다.
      if (state.now >= bot.aiHazardDecisionUntilMs) {
        bot.aiHazardDecisionUntilMs = state.now + 170;
        let nearestHazard = null;
        let nearestDistSq = Infinity;
        for (const d of state.dots) {
          if (d.type !== "hazard") continue;
          const dxh = d.x - bot.x;
          const dyh = d.y - bot.y;
          const distSq = dxh * dxh + dyh * dyh;
          if (distSq < nearestDistSq) {
            nearestDistSq = distSq;
            nearestHazard = d;
          }
        }
        if (nearestHazard && nearestDistSq <= CONFIG.AI_HAZARD_DETECT_RADIUS * CONFIG.AI_HAZARD_DETECT_RADIUS) {
          if (Math.random() < CONFIG.AI_HAZARD_AVOID_CHANCE) {
            const ax = bot.x - nearestHazard.x;
            const ay = bot.y - nearestHazard.y;
            const alen = Math.hypot(ax, ay) || 1;
            bot.aiAvoidX = ax / alen;
            bot.aiAvoidY = ay / alen;
            bot.aiAvoidHazardUntilMs = state.now + rand(190, 420);
          }
        }
      }

      const avoidingHazard = state.now < bot.aiAvoidHazardUntilMs;
      if (state.now >= bot.aiJitterUntilMs) {
        bot.aiJitterUntilMs = state.now + rand(180, 420);
        bot.aiJitterX = rand(-0.22, 0.22);
        bot.aiJitterY = rand(-0.22, 0.22);
      }

      if (!target) {
        const wander = bot.aiWobblePhase + state.now * 0.0018;
        let wx = Math.cos(wander) * 0.5 + bot.aiJitterX;
        let wy = Math.sin(wander) * 0.5 + bot.aiJitterY;
        if (avoidingHazard) {
          wx = wx * 0.45 + bot.aiAvoidX * 1.2;
          wy = wy * 0.45 + bot.aiAvoidY * 1.2;
        }
        const wlen = Math.hypot(wx, wy) || 1;
        return {
          x: wx / wlen,
          y: wy / wlen
        };
      }

      const dx = target.x - bot.x;
      const dy = target.y - bot.y;
      const len = Math.hypot(dx, dy) || 1;
      const nx = dx / len;
      const ny = dy / len;

      // 각 봇마다 위상/지터를 달리해 직선 추적을 완화한다.
      const wobble = Math.sin(state.now * 0.006 + bot.aiWobblePhase) * 0.24;
      const px = -ny;
      const py = nx;
      let mixedX = nx + px * wobble + bot.aiJitterX;
      let mixedY = ny + py * wobble + bot.aiJitterY;

      if (avoidingHazard) {
        mixedX = mixedX * 0.5 + bot.aiAvoidX * 1.25;
        mixedY = mixedY * 0.5 + bot.aiAvoidY * 1.25;
      }

      const mixedLen = Math.hypot(mixedX, mixedY) || 1;
      return { x: mixedX / mixedLen, y: mixedY / mixedLen };
    }

    function onCollectDot(actor, dot) {
      const def = dotDef(dot.type);
      if (dot.type === "hazard") {
        const loss = Math.min(actor.score, Math.floor(actor.score * CONFIG.HAZARD_LOSS_RATE));
        actor.score -= loss;
        actor.lastScoreUpdateMs = state.now;
        actor.flashUntilMs = state.now + 450;
        if (loss > 0) spawnRestitutionDots(loss, dot.x, dot.y);
      } else {
        const baseGain = def.base + actor.combo * 2;
        const mul = actor.isPlayer ? CONFIG.PLAYER_GAIN_MUL : CONFIG.BOT_GAIN_MUL;
        const gain = baseGain * mul;
        actor.score += gain;
        actor.combo = Math.min(CONFIG.MAX_COMBO, actor.combo + def.comboGain);
        actor.scaleLevel = Math.min(CONFIG.MAX_SCALE_LEVEL, actor.scaleLevel + def.comboGain * CONFIG.SCALE_GAIN_MUL);
        actor.lastCollectMs = state.now;
        actor.lastScoreUpdateMs = state.now;
        if (dot.type === "fever") {
          actor.feverUntilMs = Math.max(actor.feverUntilMs, state.now + CONFIG.FEVER_MS);
        }
        if (actor.isPlayer) {
          if (state.now - actor.chainLastCollectMs <= CONFIG.CHAIN_WINDOW_MS) state.uiChainCount += 1;
          else state.uiChainCount = 1;
          actor.chainLastCollectMs = state.now;
          state.uiChainUntil = state.now + CONFIG.CHAIN_WINDOW_MS;
        }
      }
      spawnCollectParticles(dot);
    }

    function spawnRestitutionDots(loss, x, y) {
      const count = clamp(Math.floor(loss / 18), 3, 12);
      for (let i = 0; i < count && state.dots.length < CONFIG.DOT_MAX; i++) {
        const angle = rand(0, Math.PI * 2);
        const speed = rand(700, 1200);
        state.dots.push({
          id: state.nextDotId++,
          type: "normal",
          x,
          y,
          size: 10,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          lifeLeftMs: 0,
          launchUntilMs: state.now + CONFIG.HAZARD_LAUNCH_MS,
          spawnedMs: state.now
        });
      }
    }

    function spawnCollectParticles(dot) {
      const tier = {
        normal: { count: 7, speed: 120, life: 420, size: 2.2, color: "#53f5ff" },
        bonus: { count: 10, speed: 145, life: 470, size: 2.6, color: "#91ff62" },
        fever: { count: 14, speed: 170, life: 520, size: 3.0, color: "#ff7ef1" },
        chaser: { count: 16, speed: 190, life: 560, size: 3.2, color: "#b989ff" },
        hazard: { count: 12, speed: 150, life: 500, size: 2.9, color: "#ff5e7f" }
      }[dot.type];

      const count = Math.max(2, Math.floor(tier.count * state.particleQualityMul));
      for (let i = 0; i < count; i++) {
        if (state.particles.length >= CONFIG.MAX_PARTICLES) break;
        const a = rand(0, Math.PI * 2);
        const sp = rand(tier.speed * 0.45, tier.speed) * 6;
        state.particles.push({
          id: state.nextParticleId++,
          x: dot.x,
          y: dot.y,
          vx: Math.cos(a) * sp,
          vy: Math.sin(a) * sp,
          lifeMs: tier.life,
          maxLifeMs: tier.life,
          size: rand(tier.size * 0.7, tier.size * 1.25) * 4,
          color: tier.color
        });
      }
    }

    function updateParticles(dtMs) {
      const dt = dtMs / 1000;
      for (let i = state.particles.length - 1; i >= 0; i--) {
        const p = state.particles[i];
        p.lifeMs -= dtMs;
        if (p.lifeMs <= 0) {
          state.particles.splice(i, 1);
          continue;
        }
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= 0.93;
        p.vy *= 0.93;
      }
    }

    function updateCamera() {
      const player = state.player;
      const scaleLevel = player ? player.scaleLevel : 0;
      const raw = (1 / (1 + scaleLevel * 0.007)) * 1.3;
      state.targetZoom = clamp(raw, 0.2, 3.0);
      state.zoom += (state.targetZoom - state.zoom) * 0.1;

      const effectiveZoom = state.zoom * viewScale;
      const halfW = gameView.width / (2 * effectiveZoom);
      const halfH = gameView.height / (2 * effectiveZoom);
      state.camX = clamp(player.x, halfW, CONFIG.MAP_W - halfW);
      state.camY = clamp(player.y, halfH, CONFIG.MAP_H - halfH);
    }

    function comboStyle(combo) {
      if (combo <= 15) return { color: "#ffffff", scale: 1.0 };
      if (combo <= 30) return { color: "#6ab2ff", scale: 1.1 };
      if (combo <= 45) return { color: "#ffe16b", scale: 1.2 };
      if (combo <= 60) return { color: "#ff5d66", scale: 1.3 };
      return { color: "#ca8eff", scale: 1.4 };
    }

    function updateComboUI() {
      const combo = Math.floor(state.player.combo);
      const withinChainWindow = state.now - state.player.chainLastCollectMs <= CONFIG.CHAIN_WINDOW_MS;
      const visible = withinChainWindow && combo > 0;
      if (!visible) {
        state.uiChainCount = 0;
        els.comboText.style.opacity = "0";
        return;
      }
      const style = comboStyle(combo);
      els.comboText.style.color = style.color;
      els.comboText.textContent = "COMBO x" + combo;
      const pulse = 1 + Math.sin(state.now * 0.03) * 0.08;
      els.comboText.style.transform = "translateX(-50%) scale(" + (style.scale * pulse).toFixed(3) + ")";
      els.comboText.style.opacity = "1";
    }

    function drawWorld() {
      ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);

      ctx.fillStyle = "#050512";
      ctx.fillRect(0, 0, canvas.width / dpr, canvas.height / dpr);

      ctx.fillStyle = CONFIG_BG_WORLD;
      ctx.fillRect(gameView.x, gameView.y, gameView.width, gameView.height);

      ctx.save();
      ctx.beginPath();
      ctx.rect(gameView.x, gameView.y, gameView.width, gameView.height);
      ctx.clip();

      const effectiveZoom = state.zoom * viewScale;
      ctx.translate(gameView.x + gameView.width * 0.5, gameView.y + gameView.height * 0.5);
      ctx.scale(effectiveZoom, effectiveZoom);
      ctx.translate(-state.camX, -state.camY);

      drawGrid();
      drawDots();
      drawParticles();
      drawActors();
      ctx.restore();

      drawJoystick();
    }

    const CONFIG_BG_WORLD = "#0b0b1a";

    function drawGrid() {
      ctx.strokeStyle = "rgba(120, 120, 190, 0.08)";
      ctx.lineWidth = 1 / (state.zoom * viewScale);
      for (let x = 0; x <= CONFIG.MAP_W; x += 100) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, CONFIG.MAP_H);
        ctx.stroke();
      }
      for (let y = 0; y <= CONFIG.MAP_H; y += 100) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(CONFIG.MAP_W, y);
        ctx.stroke();
      }
    }

    function drawDots() {
      const lowFx = state.particleQualityMul < 1;
      for (const d of state.dots) {
        const def = dotDef(d.type);
        const pulse = 0.86 + Math.sin((state.now + d.id * 43) * 0.008) * 0.14;
        const size = d.size * pulse;
        if (!lowFx) {
          ctx.shadowBlur = 16;
          ctx.shadowColor = def.color;
        } else {
          ctx.shadowBlur = 10;
          ctx.shadowColor = def.color;
        }
        ctx.fillStyle = def.color;

        if (d.type === "hazard") {
          drawTriangle(d.x, d.y, size + 2);
          if (state.now >= d.launchUntilMs) {
            ctx.save();
            ctx.strokeStyle = "rgba(255,85,113,0.45)";
            ctx.lineWidth = 1.8;
            const rr = 17 + Math.sin(state.now * 0.013 + d.id) * 3;
            ctx.beginPath();
            ctx.arc(d.x, d.y, rr, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
          }
        } else {
          ctx.fillRect(d.x - size * 0.5, d.y - size * 0.5, size, size);
        }
      }
      ctx.shadowBlur = 0;
    }

    function drawTriangle(x, y, size) {
      ctx.beginPath();
      ctx.moveTo(x, y - size);
      ctx.lineTo(x - size * 0.85, y + size * 0.8);
      ctx.lineTo(x + size * 0.85, y + size * 0.8);
      ctx.closePath();
      ctx.fill();
    }

    function actorRenderPos(a) {
      if (state.phase !== "join" || a.isPlayer || !a.joinPosStart) return { x: a.x, y: a.y };
      const t = clamp((state.now - a.joinTs) / CONFIG.JOIN_SLIDE_MS, 0, 1);
      const e = easeOutCubic(t);
      return {
        x: a.joinPosStart.x + (a.x - a.joinPosStart.x) * e,
        y: a.joinPosStart.y + (a.y - a.joinPosStart.y) * e
      };
    }

    function drawActors() {
      const leader = state.rankings[0] ? state.rankings[0].id : null;
      for (const a of state.actors) {
        if (!a.isPlayer && !a.joined) continue;
        const p = actorRenderPos(a);
        const r = actorRadius(a);
        const flash = state.now < a.flashUntilMs;
        const color = a.isPlayer ? (flash ? "#ff617f" : "#5ad9ff") : (flash ? "#ff617f" : "#84ffa4");
        const stroke = a.isPlayer ? "#c4f6ff" : "#d5ffe4";

        ctx.save();
        ctx.shadowBlur = state.particleQualityMul < 1 ? 9 : 15;
        ctx.shadowColor = color;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.lineWidth = 2.2;
        ctx.strokeStyle = stroke;
        ctx.stroke();
        ctx.restore();

        if (leader === a.id) drawCrown(p.x, p.y - r - 42);

        ctx.save();
        ctx.font = "bold 18px sans-serif";
        ctx.fillStyle = a.isPlayer ? "#ffe79f" : "#f0f6ff";
        ctx.textAlign = "center";
        ctx.fillText(a.name, p.x, p.y - r - 10);
        ctx.restore();
      }
    }

    function drawCrown(x, y) {
      ctx.save();
      ctx.fillStyle = "#ffd66f";
      ctx.strokeStyle = "#fff1ad";
      ctx.lineWidth = 1.3;
      ctx.beginPath();
      ctx.moveTo(x - 11, y + 6);
      ctx.lineTo(x - 6, y - 4);
      ctx.lineTo(x, y + 2);
      ctx.lineTo(x + 6, y -4);
      ctx.lineTo(x + 11, y + 6);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function drawParticles() {
      for (const p of state.particles) {
        const alpha = clamp(p.lifeMs / p.maxLifeMs, 0, 1);
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.shadowBlur = state.particleQualityMul < 1 ? 7 : 12;
        ctx.shadowColor = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawJoystick() {
      if (!state.pointer.active) return;
      const radius = 80 * viewScale;
      const dx = state.pointer.x - state.pointer.sx;
      const dy = state.pointer.y - state.pointer.sy;
      const len = Math.hypot(dx, dy);
      const clamped = Math.min(radius, len);
      const nx = len > 0 ? dx / len : 0;
      const ny = len > 0 ? dy / len : 0;
      const hx = state.pointer.sx + nx * clamped;
      const hy = state.pointer.sy + ny * clamped;
      ctx.save();
      ctx.globalAlpha = 0.9;
      ctx.strokeStyle = "rgba(180,210,255,0.65)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(state.pointer.sx, state.pointer.sy, radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = "rgba(95, 215, 255, 0.55)";
      ctx.beginPath();
      ctx.arc(hx, hy, 26 * viewScale, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function updateScaleLayout() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const targetRatio = 16 / 9;
      let vw = w;
      let vh = vw / targetRatio;
      if (vh > h) {
        vh = h;
        vw = vh * targetRatio;
      }
      gameView.width = vw;
      gameView.height = vh;
      gameView.x = (w - vw) * 0.5;
      gameView.y = (h - vh) * 0.5;
      viewScale = Math.min(vw / 1600, 1.1);
      const uiScale = viewScale;
      const sideLetterBox = w - (gameView.x + gameView.width);

      els.ranking.style.top = (gameView.y + 22 * uiScale).toFixed(1) + "px";
      els.ranking.style.right = (sideLetterBox + 20 * uiScale).toFixed(1) + "px";
      els.ranking.style.transform = "scale(" + (1.2 * uiScale).toFixed(3) + ")";
      els.startBlock.style.transform = "scale(" + Math.min(viewScale * 1.02, 1).toFixed(3) + ")";
      els.joinCard.style.transform = "scale(" + Math.min(viewScale * 1.02, 1).toFixed(3) + ")";
      els.resultCard.style.transform = "scale(" + Math.min(viewScale * 1.02, 1).toFixed(3) + ")";
      els.timer.style.top = (gameView.y + 24 * uiScale).toFixed(1) + "px";
      els.timer.style.transform = "translateX(-50%) scale(" + Math.min(uiScale + 0.08, 1.18).toFixed(3) + ")";
      els.comboText.style.top = (gameView.y + 170 * uiScale).toFixed(1) + "px";
    }

    function resizeCanvas() {
      dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      updateScaleLayout();
    }

    function gameLoop(now) {
      state.now = now;
      const dtMs = clamp(now - state.lastFrame, 0, 40);
      state.lastFrame = now;
      const fps = dtMs > 0 ? 1000 / dtMs : 60;
      state.fpsEMA = state.fpsEMA * 0.92 + fps * 0.08;
      if (state.fpsEMA < CONFIG.TARGET_FPS_DROP) state.lowFpsAccMs += dtMs;
      else state.lowFpsAccMs = Math.max(0, state.lowFpsAccMs - dtMs * 0.7);
      state.particleQualityMul = state.lowFpsAccMs >= 1000 ? 0.7 : 1;

      if (state.phase === "join") updateJoin(dtMs);
      else if (state.phase === "startfx") updateStartFx();
      else if (state.phase === "playing") updatePlaying(dtMs);
      else if (state.phase === "ended") {
        renderRankingPanel();
      } else {
        updateWorld(dtMs, false);
        els.timer.textContent = "60.0";
      }

      updateHudVisibility();
      drawWorld();
      requestAnimationFrame(gameLoop);
    }

    function pointerToNorm(clientX, clientY) {
      const radius = 80 * viewScale;
      const dx = clientX - state.pointer.sx;
      const dy = clientY - state.pointer.sy;
      const len = Math.hypot(dx, dy);
      const used = Math.min(radius, len);
      const nx = len > 0 ? (dx / len) * (used / radius) : 0;
      const ny = len > 0 ? (dy / len) * (used / radius) : 0;
      state.pointer.nx = clamp(nx, -1, 1);
      state.pointer.ny = clamp(ny, -1, 1);
    }

    function setKey(code, down) {
      if (code === "ArrowUp" || code === "KeyW") state.keys.up = down;
      else if (code === "ArrowDown" || code === "KeyS") state.keys.down = down;
      else if (code === "ArrowLeft" || code === "KeyA") state.keys.left = down;
      else if (code === "ArrowRight" || code === "KeyD") state.keys.right = down;
    }

    function onPointerDown(e) {
      if (state.phase !== "playing") return;
      state.pointer.active = true;
      state.pointer.id = e.pointerId;
      state.pointer.sx = e.clientX;
      state.pointer.sy = e.clientY;
      state.pointer.x = e.clientX;
      state.pointer.y = e.clientY;
      state.pointer.nx = 0;
      state.pointer.ny = 0;
    }

    function onPointerMove(e) {
      if (!state.pointer.active || state.pointer.id !== e.pointerId) return;
      state.pointer.x = e.clientX;
      state.pointer.y = e.clientY;
      pointerToNorm(e.clientX, e.clientY);
    }

    function onPointerUp(e) {
      if (!state.pointer.active || state.pointer.id !== e.pointerId) return;
      state.pointer.active = false;
      state.pointer.id = null;
      state.pointer.nx = 0;
      state.pointer.ny = 0;
    }

    function bindEvents() {
      window.addEventListener("resize", resizeCanvas);
      window.addEventListener("pointerdown", onPointerDown);
      window.addEventListener("pointermove", onPointerMove);
      window.addEventListener("pointerup", onPointerUp);
      window.addEventListener("pointercancel", onPointerUp);

      window.addEventListener("keydown", (e) => {
        setKey(e.code, true);
      });
      window.addEventListener("keyup", (e) => {
        setKey(e.code, false);
      });
      window.addEventListener("blur", () => {
        state.pointer.active = false;
        state.pointer.nx = 0;
        state.pointer.ny = 0;
        state.keys.up = state.keys.down = state.keys.left = state.keys.right = false;
      });

      els.startBtn.addEventListener("click", () => {
        beginJoinPhase();
      });
      els.restartBtn.addEventListener("click", () => {
        beginStartScreen();
      });
      els.fullscreenBtn.addEventListener("click", async () => {
        const root = document.documentElement;
        try {
          if (!document.fullscreenElement) {
            await root.requestFullscreen();
            els.fullscreenBtn.textContent = "창화면";
          } else {
            await document.exitFullscreen();
            els.fullscreenBtn.textContent = "전체화면";
          }
        } catch (err) {
          alert("이 환경에서는 전체화면이 제한될 수 있습니다.");
        }
      });
      document.addEventListener("fullscreenchange", () => {
        els.fullscreenBtn.textContent = document.fullscreenElement ? "창화면" : "전체화면";
      });
    }

    function init() {
      bindEvents();
      resizeCanvas();
      beginStartScreen();
      resetRun();
      requestAnimationFrame((t) => {
        state.lastFrame = t;
        requestAnimationFrame(gameLoop);
      });
    }

    init();
  </script>
</body>
</html>
